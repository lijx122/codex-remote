<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Codex Remote</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <button id="sidebarToggle" class="btn-icon" title="侧栏">☰</button>

    <div id="app">
      <aside id="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-logo">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="5" stroke="currentColor" stroke-width="1.5"/><path d="M8 12h8M12 8v8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            <h1>Codex</h1>
          </div>
          <button id="refreshThreads" class="btn-icon" title="刷新会话">
            <svg width="16" height="16" viewBox="0 0 18 18" fill="none"><path d="M15 3v4h-4M3 15v-4h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M12.5 5.5A5.5 5.5 0 004.9 9.1M13.1 8.9a5.5 5.5 0 01-7.6 3.6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </button>
        </div>

        <nav id="threads"></nav>

        <div class="sidebar-footer">
          <input id="controlPlaneUrl" placeholder="127.0.0.1:8787" spellcheck="false" />
        </div>
      </aside>

      <main id="chat">
        <header id="chatHeader">
          <h2 id="currentTitle">未选择会话</h2>
          <div class="header-actions">
            <span id="status"></span>
            <button id="interrupt" class="btn-danger" disabled>Stop</button>
          </div>
        </header>

        <div id="messages">
          <div class="empty-state">选择一个会话开始</div>
        </div>

        <form id="composer">
          <textarea id="messageInput" rows="1" placeholder="消息…" disabled></textarea>
          <button id="send" type="submit" disabled>
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M2 10l16-8-8 16-2-6-6-2z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </form>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
