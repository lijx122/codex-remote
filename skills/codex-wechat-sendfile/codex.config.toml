[skill]
name = "codex-wechat-sendfile"
source = "F:\\cx\\cx\\codex\\skills\\codex-wechat-sendfile\\SKILL.md"
trigger = "Use when the user asks an agent to send a generated local artifact back to WeChat."

[sendfile]
endpoint = "http://127.0.0.1:8787/sendfile"
method = "POST"
body = "{ path = '<absolute local file path>' }"
preferred_shell = "powershell"
